; ==========================================================
;  LucyTrace Configuration
;  "Turn 'Ruff Drafts' into the 'Director's Cut'"
; ==========================================================

[General]
; Default Profile: 'adv' (Smart/Auto-Levels) or 'base' (Fast/Strict)
profile = adv
; Output resolution for PNGs (3000 is good for 8.5x11 prints)
export_width = 3072
; Force reprocessing of existing files? (true/false)
overwrite = false

[ImageProcessing]
; Threshold: Cutoff for black vs white (50-60% is standard)
threshold_percent = 55%

; --- Advanced Profile Settings ---
; Auto-Levels: Stretches contrast (e.g., "10%,90%" fixes muddy blacks)
level_adjustment = 10%,90%
; Posterize: Reduces colors before B&W conversion (lower = chunkier)
posterize_colors = 8
; Saturation Threshold: How much color triggers "Color Mode" (0.05 = 5%)
saturation_threshold = 0.20

[Modes]
; These control the Advanced Profile logic
; mode: auto, color, or bw
mode = auto
; invert: on or off (useful for white-on-black inputs)
invert = off

[Potrace]
; Turdsize: Remove speckles smaller than this (pixels)
turdsize = 5
; Opttolerance: 0.2 (exact) to 1.0 (loose). 0.5 is ideal for CAD/Laser.
opttolerance = 0.5